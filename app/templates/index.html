<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/compact.css') }}">
</head>
<body>
    <main class="page-shell compact-shell">
        <header class="simple-brand">
            <h1>Oylut Clipping</h1>
        </header>

        <section class="search-card compact-card" aria-labelledby="search-title">
            <form method="post" action="/pesquisar">
                <h2 id="search-title">Novo monitoramento</h2>

                {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

                <label for="main_term">Termo principal</label>
                <input id="main_term" name="main_term" type="text" maxlength="150" required
                       placeholder="Ex.: nome principal" value="{{ form.main_term if form else '' }}">

                <label for="variations">Termos secundários</label>
                <textarea id="variations" name="variations" rows="3"
                          placeholder="Ex.: variação do nome&#10;Ex.: outra forma de busca">{{ form.variations if form else '' }}</textarea>

                <label for="period_hours">Período</label>
                <select id="period_hours" name="period_hours">
                    {% set selected_period = form.period_hours if form else 24 %}
                    <option value="24" {% if selected_period == 24 %}selected{% endif %}>Últimas 24 horas</option>
                    <option value="48" {% if selected_period == 48 %}selected{% endif %}>Últimas 48 horas</option>
                    <option value="72" {% if selected_period == 72 %}selected{% endif %}>Últimas 72 horas</option>
                    <option value="168" {% if selected_period == 168 %}selected{% endif %}>Últimos 7 dias</option>
                </select>

                <button type="submit">Pesquisar</button>
            </form>
        </section>
    </main>
</body>
</html>
