name: Executar clippings automáticos

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  executar:
    runs-on: ubuntu-latest

    steps:
      - name: Acordar aplicação
        run: |
          curl --retry 5 \
               --retry-delay 15 \
               --max-time 120 \
               https://oylut-clipping.onrender.com/saude

      - name: Executar clippings programados
        run: |
          curl --fail \
               --show-error \
               --silent \
               --retry 3 \
               --retry-delay 10 \
               --max-time 300 \
               -X POST \
               https://oylut-clipping.onrender.com/tarefas/agendamentos/executar
